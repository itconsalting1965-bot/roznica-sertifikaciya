const state = {
  screen: "setup",
  selectedIds: QUESTION_BANK.map(m => m.id),
  employeeName: "",
  accessCode: "",
  accessError: "",
  checkingAccess: false,
  answers: {},        // key `${moduleId}#${qIndex}` -> array of selected indices
  showReview: false,
  submitStatus: null,  // null | 'sending' | 'ok' | 'error'
  submitError: "",
  lastPayload: null
};

function qKey(moduleId, qi) { return moduleId + "#" + qi; }

function totalQuestionsIn(moduleIds) {
  return QUESTION_BANK.filter(m => moduleIds.includes(m.id))
    .reduce((sum, m) => sum + m.questions.length, 0);
}

function answeredCountIn(moduleId) {
  const mod = QUESTION_BANK.find(m => m.id === moduleId);
  let n = 0;
  mod.questions.forEach((q, qi) => {
    const a = state.answers[qKey(moduleId, qi)];
    if (a && a.length) n++;
  });
  return n;
}

function isCorrect(moduleId, qi) {
  const mod = QUESTION_BANK.find(m => m.id === moduleId);
  const q = mod.questions[qi];
  const sel = (state.answers[qKey(moduleId, qi)] || []).slice().sort();
  const cor = q.correct.slice().sort();
  return sel.length === cor.length && sel.every((v, i) => v === cor[i]);
}

function scoreForModule(moduleId) {
  const mod = QUESTION_BANK.find(m => m.id === moduleId);
  let correct = 0;
  mod.questions.forEach((q, qi) => { if (isCorrect(moduleId, qi)) correct++; });
  return { correct, total: mod.questions.length };
}

async function apiCall(action, payload) {
  const res = await fetch(CONFIG.API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ action }, payload))
  });
  return res.json();
}

function render() {
  const app = document.getElementById("app");
  if (state.screen === "setup") app.innerHTML = renderSetup();
  else if (state.screen === "exam") app.innerHTML = renderExam();
  else app.innerHTML = renderResults();
  attachHandlers();
  window.scrollTo(0, 0);
}

  const totalQ = totalQuestionsIn(QUESTION_BANK.map(m => m.id));
  const rows = QUESTION_BANK.map(m => {

    </label>`;
  }).join("");

  return `
    <div class="eyebrow">Сертификация · Розница и склад</div>

    <p class="page-sub">Тест разбит на ${QUESTION_BANK.length} модулей — каждый соответствует отдельной функциональной

          </div>
          <div>

            <input type="password" id="accessCode" placeholder="Выдан вашим руководителем" value="${state.accessCode}" />
          </div>
        </div>

      </div>

      <div class="card">
        <div class="scope-toggle">
          <button id="scopeAll" class="${state.selectedIds.length === QUESTION_BANK.length ? 'active' : ''}">Весь курс (${totalQ} вопросов)</button>
          <button id="scopeNone" class="${state.selectedIds.length === 0 ? 'active' : ''}">Снять всё</button>
        </div>
        <div class="module-list">${rows}</div>
      </div>

      <div>
        <button id="startBtn" class="primary-btn" ${canStart ? "" : "disabled"}>
          ${state.checkingAccess ? "Проверяем доступ…" : "Начать тестирование →"}

}

function renderExam() {
  const mods = QUESTION_BANK.filter(m => state.selectedIds.includes(m.id));
  const total = totalQuestionsIn(state.selectedIds);
  const answered = mods.reduce((s, m) => s + answeredCountIn(m.id), 0);
  const pct = total ? Math.round((answered/total)*100) : 0;

  const chips = mods.map(m => {
    const ac = answeredCountIn(m.id), tot = m.questions.length;
    const cls = ac === tot ? "done" : (ac > 0 ? "partial" : "");
    return `<button class="chip ${cls}" data-jump="${m.id}">${m.title.split(":")[0]} · ${ac}/${tot}</button>`;
  }).join("");

  const sections = mods.map((m, mi) => {
    const ac = answeredCountIn(m.id);
    const qs = m.questions.map((q, qi) => {
      const selected = state.answers[qKey(m.id, qi)] || [];
      const inputType = q.type === "multiple" ? "checkbox" : "radio";
      const opts = q.options.map((opt, oi) => {
        const checked = selected.includes(oi) ? "checked" : "";
        return `<label class="option-row">
          <input type="${inputType}" name="${qKey(m.id,qi)}" value="${oi}" data-mod="${m.id}" data-qi="${qi}" ${checked} />
          <span>${opt}</span>
        </label>`;
      }).join("");
      return `<div class="card question-card">
        <fieldset>
          <legend class="q-text">${qi+1}. ${q.text}</legend>
          <div class="q-hint">${q.type === "multiple" ? "Выберите все подходящие варианты" : "Выберите один вариант"}</div>
          ${opts}
        </fieldset>
      </div>`;
    }).join("");

    return `<section class="module-section" id="sec-${m.id}">
      <div class="module-heading">
        <span class="m-idx mono">${String(mi+1).padStart(2,"0")}</span>
        <h2>${m.title}</h2>
      </div>
      <div class="module-progress mono">${ac} / ${m.questions.length} отвечено</div>
      ${qs}
    </section>`;
  }).join("");

  return `
    <div class="topbar no-print">
      <div class="topbar-inner">
        <div class="progress-row">
          <span style="font-size:0.85rem; color:var(--muted);">Прогресс тестирования</span>
          <span class="mono" style="font-size:0.85rem;">${answered} / ${total} · ${pct}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
        <div class="chip-row">${chips}</div>
      </div>
    </div>
    ${sections}
    <div class="exam-footer">
      <span class="note">${answered < total ? "Оставшиеся без ответа вопросы будут засчитаны как неверные." : "Все вопросы отвечены."}</span>
      <button id="finishBtn" class="primary-btn">Завершить тестирование →</button>
    </div>
  `;
}

function buildResultPayload() {
  const mods = QUESTION_BANK.filter(m => state.selectedIds.includes(m.id));
  let totalCorrect = 0, totalQ = 0;
  const modules = mods.map(m => {
    const { correct, total } = scoreForModule(m.id);
    totalCorrect += correct; totalQ += total;
    return { id: m.id, title: m.title, correct, total };
  });
  const overallPercent = totalQ ? Math.round((totalCorrect/totalQ)*100) : 0;
  return {
    fio: state.employeeName.trim(),
    accessCode: state.accessCode,
    modules,
    overallCorrect: totalCorrect,
    overallTotal: totalQ,
    overallPercent,
    overallPass: totalQ ? (totalCorrect/totalQ) >= PASS_THRESHOLD : false
  };
}

function renderResults() {
  const mods = QUESTION_BANK.filter(m => state.selectedIds.includes(m.id));
  let totalCorrect = 0, totalQ = 0;
  const rows = mods.map(m => {
    const {correct, total} = scoreForModule(m.id);
    totalCorrect += correct; totalQ += total;
    const pct = total ? correct/total : 0;
    const pass = pct >= PASS_THRESHOLD;
    return `<tr>
      <td>${m.title}</td>
      <td class="num mono">${correct}/${total}</td>
      <td class="num mono">${Math.round(pct*100)}%</td>
      <td><span class="status-chip ${pass ? 'pass':'fail'}">${pass ? "Подтверждено" : "Не подтверждено"}</span></td>
    </tr>`;
  }).join("");

  const overallPct = totalQ ? totalCorrect/totalQ : 0;
  const overallPass = overallPct >= PASS_THRESHOLD;

  let submitHtml = "";
  if (state.submitStatus === "sending") {
    submitHtml = `<div class="submit-status sending no-print">Отправляем результат в базу…</div>`;
  } else if (state.submitStatus === "ok") {
    submitHtml = `<div class="submit-status ok no-print">✓ Результат сохранён в базе — ${state.employeeName}</div>`;
  } else if (state.submitStatus === "error") {
    submitHtml = `<div class="submit-status error no-print">Не удалось отправить результат (${state.submitError}). Проверьте интернет и попробуйте снова. <button id="retrySubmit" class="ghost-btn" style="margin-left:10px; padding:4px 10px;">Повторить отправку</button></div>`;
  }

  const nameLine = `<div style="margin-bottom:6px; color:var(--muted); font-size:0.9rem;">Сотрудник: <strong style="color:var(--ink);">${state.employeeName}</strong></div>`;

  const reviewHtml = mods.map(m => {
    return m.questions.map((q, qi) => {
      const ok = isCorrect(m.id, qi);
      const selected = state.answers[qKey(m.id, qi)] || [];
      const yourAnswer = selected.length ? selected.map(i => q.options[i]).join("; ") : "— без ответа —";
      const rightAnswer = q.correct.map(i => q.options[i]).join("; ");
      return `<div class="review-q ${ok ? 'correct':'incorrect'}">
        <div class="q-text">${ok ? "✓" : "✗"} ${q.text}</div>
        <div class="review-answer"><span class="label">Ваш ответ:</span> ${yourAnswer}</div>
        ${!ok ? `<div class="review-answer"><span class="label">Правильный ответ:</span> ${rightAnswer}</div>` : ""}
        <div class="review-explain">${q.explanation}</div>
      </div>`;
    }).join("");
  }).join("");

  return `
    <div class="eyebrow">Результат тестирования</div>
    <h1 class="page-title">Розничная торговля и складской учёт</h1>
    ${nameLine}
    ${submitHtml}

    <div class="verdict-banner ${overallPass ? 'pass':'fail'}">
      <div>
        <div class="v-label">Итоговый результат</div>
        <div class="v-title">${overallPass ? "Тест пройден" : "Тест не пройден"}</div>
      </div>
      <div class="v-score mono">${Math.round(overallPct*100)}%</div>
    </div>

    <div class="card table-wrap">
      <table class="results-table">
        <thead><tr><th>Модуль (потенциальная компетенция)</th><th class="num">Верно</th><th class="num">%</th><th>Статус</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="results-actions no-print">
      <button id="reviewBtn" class="ghost-btn">${state.showReview ? "Скрыть разбор ответов" : "Показать разбор ответов"}</button>
      <button id="printBtn" class="ghost-btn">Печать результата</button>
      <button id="restartBtn" class="ghost-btn">Пройти заново</button>
    </div>

    ${state.showReview ? `<div class="review-section"><h2 style="font-size:1.1rem; margin-bottom:14px;">Разбор ответов</h2>${reviewHtml}</div>` : ""}
  `;
}

async function submitResult() {
  state.submitStatus = "sending";
  render();
  const payload = buildResultPayload();
  state.lastPayload = payload;
  try {
    const res = await apiCall("submit", payload);
    if (res.ok) {
      state.submitStatus = "ok";
    } else {
      state.submitStatus = "error";
      state.submitError = res.error || "ошибка сервера";
    }
  } catch (err) {
    state.submitStatus = "error";
    state.submitError = "нет соединения";
  }
  render();
}

function attachHandlers() {
  if (state.screen === "setup") {
    document.getElementById("empName").addEventListener("input", e => { state.employeeName = e.target.value; document.getElementById("startBtn").disabled = !(state.employeeName.trim() && state.accessCode.trim() && state.selectedIds.length); });
    document.getElementById("accessCode").addEventListener("input", e => { state.accessCode = e.target.value; document.getElementById("startBtn").disabled = !(state.employeeName.trim() && state.accessCode.trim() && state.selectedIds.length); });
    document.getElementById("scopeAll").addEventListener("click", () => { state.selectedIds = QUESTION_BANK.map(m=>m.id); render(); });
    document.getElementById("scopeNone").addEventListener("click", () => { state.selectedIds = []; render(); });
    document.querySelectorAll('input[data-mod]').forEach(cb => {
      cb.addEventListener("change", e => {
        const id = e.target.getAttribute("data-mod");
        if (e.target.checked) { if (!state.selectedIds.includes(id)) state.selectedIds.push(id); }
        else { state.selectedIds = state.selectedIds.filter(x => x !== id); }
        render();
      });
    });
    document.getElementById("startBtn").addEventListener("click", async () => {
      if (!state.employeeName.trim() || !state.accessCode.trim() || state.selectedIds.length === 0) return;
      state.accessError = "";
      state.checkingAccess = true;
      render();
      try {
        const res = await apiCall("checkAccess", { accessCode: state.accessCode });
        if (res.ok) {
          state.answers = {};
          state.submitStatus = null;
          state.screen = "exam";
        } else {
          state.accessError = res.error || "Неверный код доступа";
        }
      } catch (err) {
        state.accessError = "Не удалось связаться с базой. Проверьте интернет-соединение и URL сервера.";
      }
      state.checkingAccess = false;
      render();
    });
  } else if (state.screen === "exam") {
    document.querySelectorAll('input[data-mod][data-qi]').forEach(inp => {
      inp.addEventListener("change", e => {
        const mod = e.target.getAttribute("data-mod");
        const qi = parseInt(e.target.getAttribute("data-qi"), 10);
        const key = qKey(mod, qi);
        const val = parseInt(e.target.value, 10);
        if (e.target.type === "radio") {
          state.answers[key] = [val];
        } else {
          const cur = state.answers[key] || [];
          if (e.target.checked) state.answers[key] = cur.includes(val) ? cur : cur.concat([val]);
          else state.answers[key] = cur.filter(v => v !== val);
        }
        renderTopbarOnly();
      });
    });
    document.querySelectorAll('[data-jump]').forEach(ch => {
      ch.addEventListener("click", e => {
        const id = e.target.getAttribute("data-jump");
        document.getElementById("sec-" + id).scrollIntoView({behavior:"smooth", block:"start"});
      });
    });
    document.getElementById("finishBtn").addEventListener("click", () => {
      const total = totalQuestionsIn(state.selectedIds);
      const mods = QUESTION_BANK.filter(m => state.selectedIds.includes(m.id));
      const answered = mods.reduce((s, m) => s + answeredCountIn(m.id), 0);
      if (answered < total) {
        const proceed = confirm("Отвечено на " + answered + " из " + total + " вопросов. Оставшиеся будут засчитаны как неверные. Завершить тестирование?");
        if (!proceed) return;
      }
      state.screen = "results";
      state.showReview = false;
      render();
      submitResult();
    });
  } else {
    const reviewBtn = document.getElementById("reviewBtn");
    if (reviewBtn) reviewBtn.addEventListener("click", () => { state.showReview = !state.showReview; render(); });
    const printBtn = document.getElementById("printBtn");
    if (printBtn) printBtn.addEventListener("click", () => window.print());
    const restartBtn = document.getElementById("restartBtn");
    if (restartBtn) restartBtn.addEventListener("click", () => {
      state.screen = "setup"; state.answers = {}; state.showReview = false; state.submitStatus = null; render();
    });
    const retryBtn = document.getElementById("retrySubmit");
    if (retryBtn) retryBtn.addEventListener("click", () => { submitResult(); });
  }
}

/* Обновляет только прогресс-бар/чипы в шапке во время экзамена, без перерисовки всей формы (чтобы не терять фокус) */
function renderTopbarOnly() {
  const total = totalQuestionsIn(state.selectedIds);
  const mods = QUESTION_BANK.filter(m => state.selectedIds.includes(m.id));
  const answered = mods.reduce((s, m) => s + answeredCountIn(m.id), 0);
  const pct = total ? Math.round((answered/total)*100) : 0;
  const bar = document.querySelector(".progress-fill");
  if (bar) bar.style.width = pct + "%";
  const label = document.querySelector(".progress-row span.mono");
  if (label) label.textContent = answered + " / " + total + " · " + pct + "%";
  mods.forEach(m => {
    const ac = answeredCountIn(m.id), tot = m.questions.length;
    const chip = document.querySelector('[data-jump="' + m.id + '"]');
    if (chip) {
      chip.textContent = m.title.split(":")[0] + " · " + ac + "/" + tot;
      chip.classList.toggle("done", ac === tot);
      chip.classList.toggle("partial", ac > 0 && ac < tot);
    }
    const prog = document.querySelector("#sec-" + m.id + " .module-progress");
    if (prog) prog.textContent = ac + " / " + tot + " отвечено";
  });
}

render();
</script>
