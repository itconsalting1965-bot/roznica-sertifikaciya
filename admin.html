<div class="brandbar">
  <div class="mark">АК</div>
  <div class="name">АйТи-Консалтинг <span>· админ-панель сертификации</span></div>
</div>
<div id="app"></div>

<script>
/* ============ НАСТРОЙКА ============ */
/* Тот же URL веб-приложения Google Apps Script, что и в файле теста. */
const CONFIG = {
  API_URL: "ВСТАВЬТЕ_СЮДА_URL_ПОСЛЕ_ДЕПЛОЯ_GOOGLE_APPS_SCRIPT"
};

const PASS_THRESHOLD = 0.8;

/* Список модулей курса — для построения полной сетки компетенций,
   даже если по каким-то модулям ещё не было попыток. Должен совпадать
   по id/title с QUESTION_BANK в файле теста. */
const MODULE_LIST = [
  {id:"m01", title:"Общие сведения о программе «Розница»"},
  {id:"m02", title:"Начальные навыки работы с программой"},
  {id:"m03", title:"Подготовительный этап: пользователи и роли"},
  {id:"m04", title:"Подготовительный этап: классификаторы"},
  {id:"m05", title:"Подготовительный этап: номенклатура и контрагенты"},
  {id:"m06", title:"Ввод начальных остатков"},
  {id:"m07", title:"Ценообразование"},
  {id:"m08", title:"Управление закупками"},
  {id:"m09", title:"Перемещение товаров"},
  {id:"m10", title:"Печать ценников и этикеток"},
  {id:"m11", title:"Розничные продажи в РМК"},
  {id:"m12", title:"Инвентаризация товаров"},
  {id:"m13", title:"Комплекты и комплектующие"},
  {id:"m14", title:"Розничные продажи в режиме менеджера"},
  {id:"m15", title:"Оптовая продажа товаров"},
  {id:"m16", title:"Себестоимость, валовая прибыль"},
  {id:"m17", title:"Подключаемое оборудование"}
];

const state = {
  authed: false,
  adminKey: "",
  gateError: "",
  loading: false,
  results: [],
  loadError: "",
  search: "",
  expanded: null // fio-key раскрытой строки
};

async function apiList(adminKey) {
  const url = CONFIG.API_URL + "?action=list&adminKey=" + encodeURIComponent(adminKey);
  const res = await fetch(url);
  return res.json();
}

function groupByFio(results) {
  const map = {};
  results.forEach(r => {
    const key = (r.fio || "").trim().toLowerCase();
    if (!key) return;
    if (!map[key]) map[key] = { key, fio: r.fio.trim(), attempts: [] };
    map[key].attempts.push(r);
  });
  const people = Object.values(map);
  people.forEach(p => p.attempts.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)));
  return people;
}

function bestPerModule(person) {
  const best = {};
  person.attempts.forEach(att => {
    (att.modules || []).forEach(m => {
      const pct = m.total ? m.correct / m.total : 0;
      if (!best[m.id] || pct > best[m.id].pct) {
        best[m.id] = { title: m.title, correct: m.correct, total: m.total, pct };
      }
    });
  });
  return best;
}

function confirmedCount(person) {
  const best = bestPerModule(person);
  return Object.values(best).filter(m => m.pct >= PASS_THRESHOLD).length;
}

function sparkline(values, width, height) {
  if (values.length === 0) return "";
  if (values.length === 1) {
    const y = height - (values[0] / 100) * height;
    return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
      <line x1="0" y1="${height - (PASS_THRESHOLD*100/100)*height}" x2="${width}" y2="${height - (PASS_THRESHOLD*100/100)*height}" stroke="var(--line)" stroke-width="1" stroke-dasharray="2,2" />
      <circle cx="${width/2}" cy="${y}" r="3" fill="var(--trend)" />
    </svg>`;
  }
  const step = width / (values.length - 1);
  const pts = values.map((v, i) => {
    const x = i * step;
    const y = height - (Math.max(0, Math.min(100, v)) / 100) * height;
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const areaPath = path + ` L${width},${height} L0,${height} Z`;
  const threshY = height - (PASS_THRESHOLD*100/100) * height;
  const last = pts[pts.length - 1];
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="Динамика результатов по попыткам">
    <line x1="0" y1="${threshY.toFixed(1)}" x2="${width}" y2="${threshY.toFixed(1)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="2,2" />
    <path d="${areaPath}" fill="var(--trend)" opacity="0.12" stroke="none" />
    <path d="${path}" fill="none" stroke="var(--trend)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.2" fill="var(--trend)" />
  </svg>`;
}

function render() {
  const app = document.getElementById("app");
  if (!state.authed) app.innerHTML = renderGate();
  else app.innerHTML = renderDashboard();
  attachHandlers();
}

function renderGate() {
  return `
    <div class="gate-wrap card">
      <div class="eyebrow">Только для администратора</div>
      <h1 class="page-title" style="margin-top:6px;">Вход в админ-панель</h1>
      <p class="page-sub" style="margin-bottom:20px;">Введите ключ администратора, заданный в бэкенде (константа ADMIN_KEY).</p>
      <label class="field-label" for="adminKey">Ключ администратора</label>
      <input type="password" id="adminKey" placeholder="••••••••••••" value="${state.adminKey}" />
      ${state.gateError ? `<div class="inline-error">${state.gateError}</div>` : ""}
      <div style="margin-top:16px;">
        <button id="loginBtn" class="primary-btn" ${state.loading ? "disabled" : ""}>${state.loading ? "Проверяем…" : "Войти →"}</button>
      </div>
    </div>
  `;
}

function renderDashboard() {
  const people = groupByFio(state.results);
  const filtered = state.search
    ? people.filter(p => p.fio.toLowerCase().includes(state.search.toLowerCase()))
    : people;
  filtered.sort((a, b) => a.fio.localeCompare(b.fio, "ru"));

  const totalAttempts = state.results.length;
  const totalPeople = people.length;
  const avgLast = totalPeople
    ? Math.round(people.reduce((s, p) => s + (p.attempts[p.attempts.length - 1]?.overallPercent || 0), 0) / totalPeople)
    : 0;
  const fullyConfirmed = people.filter(p => confirmedCount(p) === MODULE_LIST.length).length;

  const rows = filtered.map(p => {
    const attempts = p.attempts;
    const first = attempts[0].overallPercent || 0;
    const last = attempts[attempts.length - 1].overallPercent || 0;
    const delta = last - first;
    const deltaCls = delta > 0 ? "up" : (delta < 0 ? "down" : "flat");
    const deltaGlyph = delta > 0 ? "▲" : (delta < 0 ? "▼" : "—");
    const confirmed = confirmedCount(p);
    const spark = sparkline(attempts.map(a => a.overallPercent || 0), 96, 30);
    const isOpen = state.expanded === p.key;

    const mainRow = `<tr class="person-row" data-person="${p.key}">
      <td>${p.fio}</td>
      <td class="num mono">${attempts.length}</td>
      <td class="num mono">${first}%</td>
      <td class="num mono">${last}%</td>
      <td class="delta ${deltaCls} num">${deltaGlyph} ${Math.abs(delta)}%</td>
      <td>${spark}</td>
      <td class="num"><span class="status-chip ${confirmed === MODULE_LIST.length ? 'pass':'fail'}">${confirmed}/${MODULE_LIST.length} модулей</span></td>
    </tr>`;

    let detailRow = "";
    if (isOpen) {
      const best = bestPerModule(p);
      const badges = MODULE_LIST.map(m => {
        const b = best[m.id];
        const pass = b && b.pct >= PASS_THRESHOLD;
        const pctTxt = b ? Math.round(b.pct * 100) + "%" : "—";
        return `<div class="mod-badge ${pass ? 'pass' : ''}"><span>${m.title}</span><span class="pct">${pctTxt}</span></div>`;
      }).join("");
      const attemptsHtml = attempts.slice().reverse().map(a => {
        const d = new Date(a.timestamp);
        const dateStr = isNaN(d) ? a.timestamp : d.toLocaleString("ru-RU", {day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit"});
        return `<div class="attempt-item"><span class="a-date">${dateStr}</span><span>${a.overallCorrect}/${a.overallTotal} · ${a.overallPercent}% · ${a.overallPass ? "тест пройден" : "тест не пройден"}</span></div>`;
      }).join("");
      detailRow = `<tr class="detail-row"><td colspan="7">
        <div style="font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;">Лучший результат по модулям</div>
        <div class="badge-grid">${badges}</div>
        <div style="font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;">История попыток</div>
        <div class="attempt-list">${attemptsHtml}</div>
      </td></tr>`;
    }

    return mainRow + detailRow;
  }).join("");

  const tableOrEmpty = filtered.length
    ? `<div class="table-wrap"><table class="people-table">
        <thead><tr>
          <th>ФИО</th><th class="num">Попыток</th><th class="num">Первая</th><th class="num">Последняя</th>
          <th class="num">Динамика</th><th>История</th><th class="num">Компетенции</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`
    : `<div class="empty-state">${state.search ? "Никого не найдено по этому запросу" : "Пока никто не проходил тест"}</div>`;

  return `
    <div class="eyebrow">Сертификация · Розница и склад</div>
    <h1 class="page-title">Сводка по сотрудникам</h1>
    <p class="page-sub">Клик по строке разворачивает детали: лучший результат по каждому модулю и историю попыток.</p>

    <div class="stat-grid">
      <div class="stat-tile"><div class="s-label">Сотрудников</div><div class="s-value mono">${totalPeople}</div></div>
      <div class="stat-tile"><div class="s-label">Попыток всего</div><div class="s-value mono">${totalAttempts}</div></div>
      <div class="stat-tile"><div class="s-label">Средний % (посл. попытка)</div><div class="s-value mono">${avgLast}%</div></div>
      <div class="stat-tile"><div class="s-label">Подтвердили весь курс</div><div class="s-value mono">${fullyConfirmed}</div></div>
    </div>

    <div class="toolbar">
      <input type="text" id="searchInput" class="search-input" placeholder="Поиск по ФИО…" value="${state.search}" />
      <div style="display:flex; gap:8px;">
        <button id="refreshBtn" class="ghost-btn">${state.loading ? "Обновляем…" : "Обновить"}</button>
        <button id="exportBtn" class="ghost-btn">Экспорт CSV</button>
      </div>
    </div>

    ${state.loadError ? `<div class="inline-error" style="margin-bottom:16px;">${state.loadError}</div>` : ""}

    <div class="card">${tableOrEmpty}</div>
  `;
}

function exportCsv() {
  const people = groupByFio(state.results);
  const header = ["ФИО", "Попыток", "Первая %", "Последняя %", "Динамика", "Модулей подтверждено"].concat(MODULE_LIST.map(m => m.title));
  const lines = [header.join(";")];
  people.forEach(p => {
    const attempts = p.attempts;
    const first = attempts[0].overallPercent || 0;
    const last = attempts[attempts.length - 1].overallPercent || 0;
    const best = bestPerModule(p);
    const modCols = MODULE_LIST.map(m => (best[m.id] ? Math.round(best[m.id].pct * 100) : "") + "%");
    const row = [p.fio, attempts.length, first + "%", last + "%", (last - first) + "%", confirmedCount(p) + "/" + MODULE_LIST.length].concat(modCols);
    lines.push(row.join(";"));
  });
  const blob = new Blob(["﻿" + lines.join("\n")], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "sertifikatsiya-roznica-sklad.csv";
  link.click();
}

async function loadResults() {
  state.loading = true;
  state.loadError = "";
  render();
  try {
    const res = await apiList(state.adminKey);
    if (res.ok) {
      state.results = res.results || [];
    } else {
      state.loadError = res.error || "Ошибка загрузки данных";
    }
  } catch (err) {
    state.loadError = "Не удалось связаться с базой. Проверьте интернет и URL сервера.";
  }
  state.loading = false;
  render();
}

function attachHandlers() {
  if (!state.authed) {
    const input = document.getElementById("adminKey");
    input.addEventListener("input", e => { state.adminKey = e.target.value; });
    input.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("loginBtn").click(); });
    document.getElementById("loginBtn").addEventListener("click", async () => {
      if (!state.adminKey.trim()) return;
      state.loading = true;
      state.gateError = "";
      render();
      try {
        const res = await apiList(state.adminKey);
        if (res.ok) {
          state.authed = true;
          state.results = res.results || [];
        } else {
          state.gateError = res.error || "Неверный ключ администратора";
        }
      } catch (err) {
        state.gateError = "Не удалось связаться с базой. Проверьте интернет-соединение и CONFIG.API_URL в этом файле.";
      }
      state.loading = false;
      render();
    });
  } else {
    document.getElementById("searchInput").addEventListener("input", e => { state.search = e.target.value; render(); });
    document.getElementById("refreshBtn").addEventListener("click", () => loadResults());
    document.getElementById("exportBtn").addEventListener("click", () => exportCsv());
    document.querySelectorAll("tr.person-row").forEach(tr => {
      tr.addEventListener("click", () => {
        const key = tr.getAttribute("data-person");
        state.expanded = state.expanded === key ? null : key;
        render();
      });
    });
  }
}
